<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randomizer Kelompok</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
        background: #f4f4f4;
    }

    .container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    textarea, input, button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        font-size: 16px;
    }

    button {
        cursor: pointer;
    }

    .hasil {
        margin-top: 20px;
    }

    .kelompok {
        background: #eee;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Randomizer Kelompok 🎲</h2>

    <label>Masukkan nama (1 nama per baris):</label>
    <textarea id="namaInput" rows="10"></textarea>

    <label>Maksimal anggota per kelompok:</label>
    <input type="number" id="maxAnggota" min="1">

    <button onclick="buatKelompok()">Acak Kelompok</button>

    <div class="hasil" id="hasil"></div>
</div>

<script>
function buatKelompok() {
    let nama = document.getElementById("namaInput").value
        .split("\n")
        .map(n => n.trim())
        .filter(n => n !== "");

    let max = parseInt(document.getElementById("maxAnggota").value);

    if (nama.length === 0 || !max) {
        alert("Isi nama dan jumlah maksimal anggota terlebih dahulu");
        return;
    }

    // Acak nama
    for (let i = nama.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [nama[i], nama[j]] = [nama[j], nama[i]];
    }

    // Bagi kelompok
    let hasil = "";
    let nomor = 1;

    for (let i = 0; i < nama.length; i += max) {
        let grup = nama.slice(i, i + max);

        hasil += `
            <div class="kelompok">
                <strong>Kelompok ${nomor}</strong><br>
                ${grup.join("<br>")}
            </div>
        `;

        nomor++;
    }

    document.getElementById("hasil").innerHTML = hasil;
}
</script>

</body>
</html>
